version: "3.9"

services:

  # ── Infrastructure ──────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: jobtracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d jobtracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Services ─────────────────────────────────────────────────
  auth-service:
    build: ./services/auth-service
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://admin:secret@postgres:5432/jobtracker
      - JWT_SECRET=supersecretkey123
      - REDIS_URL=redis://redis:6379
      - DEMO_PASSWORD=${DEMO_PASSWORD:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  job-service:
    build: ./services/job-service
    ports:
      - "8002:8002"
    environment:
      - DATABASE_URL=postgresql://admin:secret@postgres:5432/jobtracker
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - AUTH_SERVICE_URL=http://auth-service:8001
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_started

  ai-service:
    build: ./services/ai-service
    ports:
      - "8003:8003"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    ports:
      - "8004:8004"
    environment:
      - DATABASE_URL=postgresql://admin:secret@postgres:5432/jobtracker
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SCHEDULER_TIMEZONE=${SCHEDULER_TIMEZONE:-America/Chicago}
      - AUTH_SERVICE_URL=http://auth-service:8001
      - JOB_SERVICE_URL=http://job-service:8002
      - AI_SERVICE_URL=http://ai-service:8003
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy

  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8001
      - JOB_SERVICE_URL=http://job-service:8002
      - AI_SERVICE_URL=http://ai-service:8003
      - NOTIFICATION_SERVICE_URL=http://notification-service:8004
      - REDIS_URL=redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      auth-service:
        condition: service_started
      job-service:
        condition: service_started
      ai-service:
        condition: service_started
      notification-service:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

volumes:
  postgres_data:
