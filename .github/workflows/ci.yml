name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Lint & syntax-check each Python service ─────────────────
  python-lint:
    name: Python — lint & syntax check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth-service, job-service, ai-service, notification-service, api-gateway]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies (${{ matrix.service }})
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements.txt

      - name: Syntax check main.py
        working-directory: services/${{ matrix.service }}
        run: python -m py_compile main.py && echo "✓ main.py OK"

      - name: Syntax check database.py (if present)
        working-directory: services/${{ matrix.service }}
        run: |
          if [ -f database.py ]; then
            python -m py_compile database.py && echo "✓ database.py OK"
          fi

  # ── Python unit tests ─────────────────────────────────────────
  python-tests:
    name: Python — unit tests
    runs-on: ubuntu-latest
    needs: python-lint
    strategy:
      matrix:
        service: [auth-service, job-service]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + pytest
        working-directory: services/${{ matrix.service }}
        run: |
          pip install -r requirements.txt
          pip install pytest httpx pytest-asyncio

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        # Tests are optional — don't fail the build if no test files exist yet
        run: |
          if [ -d tests ]; then
            pytest tests/ -v
          else
            echo "No tests directory found — skipping"
          fi

  # ── Frontend build ────────────────────────────────────────────
  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build
        working-directory: frontend
        run: npm run build

  # ── Validate docker-compose config ───────────────────────────
  compose-validate:
    name: docker-compose — validate config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check docker-compose.yml is valid
        run: docker compose config --quiet

  # ── Build Docker images (does NOT push) ──────────────────────
  docker-build:
    name: Docker — build images
    runs-on: ubuntu-latest
    needs: [python-lint, frontend-build, compose-validate]
    strategy:
      matrix:
        include:
          - context: services/auth-service
            image: job-tracker/auth-service
          - context: services/job-service
            image: job-tracker/job-service
          - context: services/ai-service
            image: job-tracker/ai-service
          - context: services/notification-service
            image: job-tracker/notification-service
          - context: services/api-gateway
            image: job-tracker/api-gateway
          - context: frontend
            image: job-tracker/frontend
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.image }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: false
          tags: ${{ matrix.image }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
