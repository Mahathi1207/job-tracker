server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so users always get the latest app
    location = /index.html {
        try_files $uri /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        expires 0;
    }

    # JS/CSS assets have content hashes in filenames — cache aggressively
    location ~* \.(?:js|css)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — send all unknown paths to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Proxy API calls to the gateway so the browser never needs to know its address
    location /api/ {
        proxy_pass http://api-gateway:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
